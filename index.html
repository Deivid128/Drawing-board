<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de desenhos.</title>

    <!-- CSS links -->

    <link rel="stylesheet" href="Styles/mainStyle.css">
    <link rel="stylesheet" href="Styles/settingsStyle.css">
    <link rel="stylesheet" href="Styles/canvasStyle.css">

    <!-- JS -->
    <script>
        document.addEventListener("contextmenu", (e) => {
            e.preventDefault();
        });
    </script>
</head>

<body>

    <div class="field">
        <canvas id="canvas" width="1520" height="550"></canvas>

        <div class="settings">

            <div class="colorsField">

                <div class="settedColors">

                    <button type="button" id="color_change"></button>
                    <button type="button" id="color_red"></button>
                    <button type="button" id="color_blue"></button>
                    <button type="button" id="color_green"></button>

                </div>

                <input type="color" id="color">
            </div>

            <input type="button" value="Refazer" id="redo">
            <input type="button" value="Desfazer" id="undo">
            <input type="button" value="Apagar" id="clear">
            <input type="range" id="rangeWidth">

        </div>
    </div>

    <!-- JS scripts -->

    <script src="Scripts/mainDrawCanvas.js"></script>
    <script src="Scripts/drawCanvasTools.js"></script>
</body>

</html>
